name: Manual Patch
permissions: write-all
env:
  repository: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  org_input: ${{ inputs.org }}
  org_event_input: ${{ github.event.inputs.org }}
on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Which apps do you want to patch?'
        required: true
        default: 'All'
        type: choice
        options:
          - 'All'
          - 'Morphe YouTube'
          - 'Morphe YouTube Music'
          - 'piko X'
          - 'piko Instagram'
          - 'Paresh Proton VPN'
          - 'Paresh JioHotstar'
          - 'hoo-dles Prime Video'
          - 'binarymend Symfonium'
          - 'Revenge Discord'
          - "Dolphin SDK 29"
          - "Eden PUBG"
          - "FCL CoD"
          - "Geode PUBGKR"
          - "Winlator PUBGVN"
          - "Amazon India"
  workflow_call:
    inputs:
      org:
        required: true
        type: string
jobs:
  patch_morphe_yt:
    name: Patch Morphe (YouTuhe)
    if: ${{ github.event.inputs.org == 'Morphe YouTube' || inputs.org == 'Morphe YouTube' || inputs.org == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > ks.keystore
          echo "${{ secrets.KEYSTORE_P12 }}" | base64 --decode > ks-p12.keystore
      - name: Preparing to patch
        uses: ./.github/actions/preparing
      - name: Check github connection
        id: check-gh
        run: bash src/etc/connection.sh
      - name: Check experimental support versions
        id: experimental-check
        if: steps.check-gh.outputs.internet_error == '0'
        uses: ./.github/actions/experimental-check
      - name: Patch apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
          youtube_experimental_support: ${{ steps.experimental-check.outputs.youtube_experimental_support }}
        id: patch
        if: steps.check-gh.outputs.internet_error == '0'
        run: bash src/build/build.sh "morphe-youtube"
      - name: Releasing APK files
        id: release
        if: steps.check-gh.outputs.internet_error == '0'
        uses: ./.github/actions/release
  patch_morphe_ytm_x86:
    name: Patch Morphe (YouTube Music x86)
