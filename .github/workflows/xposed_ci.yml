name: Manual CI
permissions: write-all
on:
  schedule:
    - cron: "0 0/4 * * *"
  workflow_dispatch:

jobs:
  Patch-Revenge-Discord:
    name: Patch Revenge(Discord)
    uses: ./.github/workflows/manual-patch.yml
    with:
      org: "Revenge Discord"
    secrets: inherit
  Patch-Eden-PUBG:
    name: Patch Eden(PUBG)
    uses: ./.github/workflows/custom-patch.yml
    with:
      org: "Eden PUBG"
    secrets: inherit
  Patch-Dolphin-SDK-29:
    name: Patch Dolphin SDK 29
    uses: ./.github/workflows/custom-patch.yml
    with:
      org: "Dolphin SDK 29"
    secrets: inherit
